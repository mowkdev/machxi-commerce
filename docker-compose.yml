services:
  db:
    image: postgres:16-alpine
    container_name: machxi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: machxi_commerce
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - machxi_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d machxi_commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  machxi_db_data:
